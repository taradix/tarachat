name: tarachat
include:
  - path: ./taracert/compose.dev.yml
services:
  backend:
    volumes:
      - ./backend/tarachat:/app/tarachat
    command: uvicorn --host=0.0.0.0 --port=80 tarachat.app:app --log-config=/app/log-config.dev.yaml --reload

  frontend:
    image: node:24-alpine
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    working_dir: /app
