name: tarachat
services:
  backend:
    build: backend
    ports:
      - "8000:8000"
    volumes:
      - backend-cache:/root/.cache
    networks:
      - tarachat-network
    command: uvicorn --host=0.0.0.0 --port=8000 tarachat.main:app --log-config=/app/log-config.yaml
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      start_period: 30s
      interval: 10s
      timeout: 5s

  frontend:
    build: frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - tarachat-network
    restart: always

volumes:
  backend-cache:

networks:
  tarachat-network:
    driver: bridge
