name: tarachat
services:
  backend:
    build: backend
    volumes:
      - backend-cache:/root/.cache
      - backend-data:/app/vector_store
      - backend-docs:/app/data/documents
    ulimits:
      memlock: -1
      stack: 67108864
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      CHUNK_SIZE: ${CHUNK_SIZE:-512}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-50}
      MAX_TOKENS: ${MAX_TOKENS:-512}
      TOP_K: ${TOP_K:-5}
    networks:
      default:
        aliases:
          - tarachat-backend
    command: uvicorn --host=0.0.0.0 --port=80 tarachat.app:app --log-config=/app/log-config.yaml
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      start_period: 60s
      interval: 10s
      timeout: 5s

  certbot:
    image: certbot/certbot:v5.5.0
    volumes:
      - ./certbot/deploy-hook.sh:/deploy-hook.sh:ro
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/html
    environment:
      SERVER_HOSTNAME: ${SERVER_HOSTNAME}
    entrypoint: ""
    command: >
      sh -c "trap exit TERM; while :; do
        certbot renew --webroot --webroot-path=/var/www/html --deploy-hook /deploy-hook.sh;
        sleep 12h;
      done"
    restart: always
    healthcheck:
      test: [ "CMD", "test", "-e", "/etc/letsencrypt/live/fullchain.pem" ]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 15

  frontend:
    build: frontend
    networks:
      default:
        aliases:
          - tarachat-frontend
    restart: always

  nginx:
    build: nginx
    depends_on:
      backend:
        condition: service_healthy
      certbot:
        condition: service_healthy
      frontend:
        condition: service_started
    volumes:
      - certbot-www:/web:ro
      - certbot-certs:/etc/letsencrypt:ro
      - ./nginx/conf.d/:/etc/nginx/conf.d/:z
    environment:
      - SERVER_HOSTNAME=${SERVER_HOSTNAME}
      - ADDITIONAL_SERVER_NAMES=${ADDITIONAL_SERVER_NAMES:-}
      - IPV4_NETWORK=${IPV4_NETWORK:-172.22.1}
    ports:
      - '${HTTP_BIND:-}:${HTTP_PORT:-80}:80'
      - '${HTTPS_BIND:-}:${HTTPS_PORT:-443}:443'
    networks:
      default:
        aliases:
          - tarachat-nginx
    restart: always

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-tarachat
    ipam:
      driver: default
      config:
        - subnet: ${IPV4_NETWORK:-172.22.1}.0/24

volumes:
  backend-cache:
  backend-data:
  backend-docs:
  certbot-www:
  certbot-certs:

