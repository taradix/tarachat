name: tarachat
services:
  backend:
    build: backend
    volumes:
      - backend-cache:/root/.cache
    ports:
      - '8000:8000'
    networks:
      - tarachat-network
    command: uvicorn --host=0.0.0.0 --port=8000 tarachat.app:app --log-config=/app/log-config.yaml
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      start_period: 30s
      interval: 10s
      timeout: 5s

  frontend:
    build: frontend
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - '80:80'
    networks:
      - tarachat-network
    restart: always
networks:
  tarachat-network:
    driver: bridge

volumes:
  backend-cache:

