name: tarachat
include:
  - path: ./taracert/compose.yml
services:
  backend:
    build: backend
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - backend-cache:/root/.cache
      - backend-data:/app/vector_store
      - backend-docs:/app/data/documents
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-OrdalieTech/Solon-embeddings-large-0.1}
      HF_TOKEN: ${HF_TOKEN:-}
      CHUNK_SIZE: ${CHUNK_SIZE:-512}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-256}
      TOP_K: ${TOP_K:-3}
      RERANKER_MODEL: ${RERANKER_MODEL:-}
      RERANK_CANDIDATES: ${RERANK_CANDIDATES:-10}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OLLAMA_URL: ${OLLAMA_URL:-http://tarachat-ollama:11434}
      MAX_TOKENS: ${MAX_TOKENS:-512}
      DEMO_MODE: ${DEMO_MODE:-0}
    networks:
      default:
        aliases:
          - tarachat-backend
    command: uvicorn --host=0.0.0.0 --port=80 tarachat.app:app --log-config=/app/log-config.yaml
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      start_period: 60s
      interval: 10s
      timeout: 5s
    runtime: nvidia
    ulimits:
      memlock: -1
      stack: 67108864

  frontend:
    build: frontend
    networks:
      default:
        aliases:
          - tarachat-frontend
    restart: always

  nginx:
    build: nginx
    depends_on:
      backend:
        condition: service_healthy
      certbot:
        condition: service_healthy
      frontend:
        condition: service_started
    volumes:
      - certbot-www:/web:ro
      - certbot-certs:/etc/letsencrypt:ro
      - ./nginx/conf.d/:/etc/nginx/conf.d/:z
    environment:
      - SERVER_HOSTNAME=${SERVER_HOSTNAME}
      - ADDITIONAL_SERVER_NAMES=${ADDITIONAL_SERVER_NAMES:-}
      - IPV4_NETWORK=${IPV4_NETWORK:-172.22.1}
    ports:
      - '${HTTP_BIND:-}:${HTTP_PORT:-80}:80'
      - '${HTTPS_BIND:-}:${HTTPS_PORT:-443}:443'
    networks:
      default:
        aliases:
          - tarachat-nginx
    restart: always

  ollama:
    image: dustynv/ollama:r36.4.0
    volumes:
      - ollama-models:/data/models/ollama/models
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_MODELS: /data/models/ollama/models
    networks:
      default:
        aliases:
          - tarachat-ollama
    command: ollama serve
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      start_period: 30s
      interval: 10s
      timeout: 5s
    runtime: nvidia
    ulimits:
      memlock: -1
      stack: 67108864

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-tarachat
    ipam:
      driver: default
      config:
        - subnet: ${IPV4_NETWORK:-172.22.1}.0/24

volumes:
  backend-cache:
  backend-data:
  backend-docs:
  ollama-models:
