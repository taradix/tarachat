[tool.poetry]
name = "tarachat-backend"
version = "0.1.0"
description = "RAG chatbot backend with CroissantLLM"
authors = ["TaraChat Team"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.10"
fastapi = "^0.109.0"
uvicorn = {extras = ["standard"], version = "^0.27.0"}
pydantic = "^2.5.0"
pydantic-settings = "^2.1.0"
python-multipart = "^0.0.6"
langchain = "^0.1.0"
langchain-community = "^0.0.10"
transformers = "^4.36.0"
torch = "^2.1.0"
sentence-transformers = "^2.3.0"
faiss-cpu = "^1.7.4"
python-dotenv = "^1.0.0"
httpx = "^0.26.0"
pypdf2 = "^3.0.0"
aiofiles = "^23.2.0"
requests = "^2.32.5"
beautifulsoup4 = "^4.14.2"
yarl = "^1.22.0"
aiohttp = "^3.13.2"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
black = "^23.12.0"
ruff = "^0.1.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
